<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おつりをピッタリわたそう</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 紙吹雪エフェクト用ライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden; 
            font-family: 'Zen Maru Gothic', sans-serif;
            background: linear-gradient(135deg, #FFE5F1 0%, #E5F3FF 100%);
        }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- Web Audio API を用いたサウンド生成エンジン ---
        const AudioEngine = (() => {
            let audioCtx = null;

            const init = () => {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            };

            const playTone = (frequency, type, duration, vol = 0.1, startTime = 0) => {
                init();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime + startTime);
                
                gainNode.gain.setValueAtTime(vol, audioCtx.currentTime + startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTime + duration);
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                oscillator.start(audioCtx.currentTime + startTime);
                oscillator.stop(audioCtx.currentTime + startTime + duration);
            };

            return {
                playCoin: () => {
                    playTone(800, 'sine', 0.05, 0.2);
                    playTone(1200, 'sine', 0.05, 0.1, 0.02);
                },
                playCorrect: () => {
                    playTone(880, 'sine', 0.2, 0.2);
                    playTone(1108.73, 'sine', 0.4, 0.2, 0.15);
                },
                playError: () => {
                    playTone(150, 'sawtooth', 0.3, 0.1);
                    playTone(140, 'sawtooth', 0.3, 0.1, 0.1);
                },
                playFanfare: () => {
                    const notes = [523.25, 659.25, 783.99];
                    notes.forEach((freq, i) => {
                        playTone(freq, 'square', 0.2, 0.08, i * 0.15);
                    });
                    setTimeout(() => {
                        playTone(1046.50, 'square', 0.8, 0.1);
                        playTone(1318.51, 'square', 0.8, 0.1);
                        playTone(1567.98, 'square', 0.8, 0.1);
                    }, 450);
                }
            };
        })();

        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const HelpCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const XCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></Icon>;
        const RotateCcw = (props) => <Icon {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const ArrowRight = (props) => <Icon {...props}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></Icon>;
        const Lightbulb = (props) => <Icon {...props}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></Icon>;

        // --- データ定義 ---
        const PRODUCTS = {
            easy: [
                { icon: '🍎', name: 'りんご', basePrice: 72 },
                { icon: '🍌', name: 'バナナ', basePrice: 63 },
                { icon: '🍅', name: 'トマト', basePrice: 76 },
                { icon: '🥕', name: 'にんじん', basePrice: 67 },
                { icon: '✏️', name: 'えんぴつ', basePrice: 54 },
                { icon: '🧽', name: 'けしごむ', basePrice: 61 },
                { icon: '🍬', name: 'あめ', basePrice: 23 },
                { icon: '🍫', name: 'チョコ', basePrice: 87 },
                { icon: '🍊', name: 'みかん', basePrice: 42 },
                { icon: '🍮', name: 'プリン', basePrice: 84 },
                { icon: '🥒', name: 'きゅうり', basePrice: 56 },
                { icon: '🧅', name: 'たまねぎ', basePrice: 48 },
                { icon: '🍩', name: 'ドーナツ', basePrice: 91 },
                { icon: '🍪', name: 'クッキー', basePrice: 34 }
            ],
            normal: [
                { icon: '🍞', name: 'パン', basePrice: 158 },
                { icon: '🥛', name: 'ぎゅうにゅう', basePrice: 128 },
                { icon: '🥚', name: 'たまご', basePrice: 248 },
                { icon: '🐟', name: 'さかな', basePrice: 188 },
                { icon: '🍦', name: 'アイス', basePrice: 145 },
                { icon: '🍰', name: 'ケーキ', basePrice: 367 }, 
                { icon: '🥤', name: 'ジュース', basePrice: 134 }, 
                { icon: '📓', name: 'ノート', basePrice: 173 }, 
                { icon: '🖍️', name: 'クレヨン', basePrice: 236 }, 
                { icon: '🧀', name: 'チーズ', basePrice: 281 }, 
                { icon: '🍗', name: 'おにく', basePrice: 317 }, 
                { icon: '🍟', name: 'ポテト', basePrice: 194 }, 
                { icon: '🍔', name: 'バーガー', basePrice: 263 }, 
                { icon: '🌭', name: 'ホットドッグ', basePrice: 219 } 
            ],
            hard: [
                { icon: '🍱', name: 'おべんとう', basePrice: 634 },
                { icon: '🥩', name: 'ステーキ', basePrice: 783 },
                { icon: '🍣', name: 'おすし', basePrice: 546 },
                { icon: '📚', name: 'ほん', basePrice: 619 },
                { icon: '🧩', name: 'パズル', basePrice: 348 }, 
                { icon: '🧸', name: 'ぬいぐるみ', basePrice: 648 },
                { icon: '🎨', name: 'えのぐ', basePrice: 412 }, 
                { icon: '🍈', name: 'メロン', basePrice: 716 },
                { icon: '🦞', name: 'えび', basePrice: 692 },
                { icon: '🍕', name: 'ピザ', basePrice: 476 }, 
                { icon: '🍜', name: 'ラーメン', basePrice: 384 }, 
                { icon: '🪁', name: 'たこ', basePrice: 671 },
                { icon: '📕', name: 'ずかん', basePrice: 764 },
                { icon: '👕', name: 'Ｔシャツ', basePrice: 687 }
            ]
        };

        const COINS = [500, 100, 50, 10, 5, 1];

        const calculateOptimalCoinCount = (amount) => {
            let remaining = amount;
            let count = 0;
            for (const coin of COINS) {
                if (remaining >= coin) {
                    count += Math.floor(remaining / coin);
                    remaining %= coin;
                }
            }
            return count;
        };

        const Coin = ({ value, scaleMultiplier = 2.0 }) => {
            const realDiameter = {
                500: 26.5,
                100: 22.6,
                50: 21.0,
                10: 23.5,
                5: 22.0,
                1: 20.0
            }[value];

            const size = realDiameter * scaleMultiplier;
            let background = '';
            let border = '';
            let color = '';
            let fontSize = size * 0.35; 
            let isHoled = value === 50 || value === 5;
            
            if (value === 500) {
                background = 'linear-gradient(135deg, #e6d8a7 0%, #c4b57e 50%, #e6d8a7 100%)';
                border = '2px solid #a3955b';
                color = '#5a512b';
            } else if (value === 100) {
                background = 'linear-gradient(135deg, #fdfdfd 0%, #c0c0c0 50%, #fdfdfd 100%)';
                border = '2px solid #999';
                color = '#444';
            } else if (value === 50) {
                background = 'radial-gradient(circle, transparent 18%, #888 19%, #fdfdfd 24%, #c0c0c0 100%)';
                border = '2px solid #999';
                color = '#444';
            } else if (value === 10) {
                background = 'linear-gradient(135deg, #e09f6e 0%, #b86b35 50%, #e09f6e 100%)';
                border = '2px solid #8b4513';
                color = '#4a2305';
            } else if (value === 5) {
                background = 'radial-gradient(circle, transparent 20%, #997000 21%, #ffd700 25%, #daa520 100%)';
                border = '2px solid #b8860b';
                color = '#523a00';
            } else if (value === 1) {
                background = 'linear-gradient(135deg, #ffffff 0%, #e2e8f0 50%, #ffffff 100%)';
                border = '2px solid #cbd5e1';
                color = '#64748b';
            }

            return (
                <div 
                    className="rounded-full flex items-center justify-center font-bold flex-shrink-0 relative overflow-hidden"
                    style={{
                        width: `${size}px`,
                        height: `${size}px`,
                        background: background,
                        border: border,
                        color: color,
                        fontSize: `${fontSize}px`,
                        textShadow: '1px 1px 0px rgba(255,255,255,0.6)',
                        boxShadow: 'inset 0 0 4px rgba(255,255,255,0.5), 0 4px 6px rgba(0,0,0,0.2)'
                    }}
                >
                    <span style={{ 
                        position: isHoled ? 'absolute' : 'static', 
                        top: isHoled ? '8%' : 'auto',
                        lineHeight: 1
                    }}>
                        {value}
                    </span>
                </div>
            );
        };

        function App() {
            // 【修正】前回のコード生成時に省略してしまった状態変数の宣言をすべて復元しました。
            const [course, setCourse] = useState('easy');
            const [hintEnabled, setHintEnabled] = useState(true);
            const [problems, setProblems] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            
            const [trayCoins, setTrayCoins] = useState([]);
            const [feedback, setFeedback] = useState(null);
            const [isGameComplete, setIsGameComplete] = useState(false);

            const [showCourseTip, setShowCourseTip] = useState(true);
            const [showHintTip, setShowHintTip] = useState(true);

            useEffect(() => {
                if (isGameComplete) {
                    AudioEngine.playFanfare();
                    
                    const duration = 3000;
                    const end = Date.now() + duration;

                    (function frame() {
                        confetti({
                            particleCount: 5,
                            angle: 60,
                            spread: 55,
                            origin: { x: 0 },
                            colors: ['#ffb6c1', '#87ceeb', '#98fb98', '#ffd700']
                        });
                        confetti({
                            particleCount: 5,
                            angle: 120,
                            spread: 55,
                            origin: { x: 1 },
                            colors: ['#ffb6c1', '#87ceeb', '#98fb98', '#ffd700']
                        });

                        if (Date.now() < end) {
                            requestAnimationFrame(frame);
                        }
                    }());
                }
            }, [isGameComplete]);

            const generateProblems = useCallback((selectedCourse) => {
                const courseProducts = [...PRODUCTS[selectedCourse]];
                const newProblems = [];
                const problemCount = 5;

                for (let i = 0; i < problemCount; i++) {
                    const randIdx = Math.floor(Math.random() * courseProducts.length);
                    const product = courseProducts[randIdx];
                    
                    const variation = Math.floor(Math.random() * 21) - 10;
                    let price = product.basePrice + variation;
                    price = Math.max(10, price);

                    let paymentAmount = 100;
                    let paymentCoins = [100];

                    if (selectedCourse === 'easy') {
                        paymentAmount = 100;
                        paymentCoins = [100];
                    } else if (selectedCourse === 'normal') {
                        if (price < 200 && Math.random() < 0.4) {
                            paymentAmount = 200;
                            paymentCoins = [100, 100];
                        } else {
                            paymentAmount = 500;
                            paymentCoins = [500];
                        }
                    } else if (selectedCourse === 'hard') {
                        paymentAmount = 1000;
                        paymentCoins = [];
                    }

                    if (price >= paymentAmount) {
                        paymentAmount = price + (100 - (price % 100) || 100);
                        paymentCoins = [paymentAmount];
                    }

                    newProblems.push({ ...product, price, paymentAmount, paymentCoins });
                }
                return newProblems;
            }, []);

            const startGame = useCallback((newCourse = course) => {
                setCourse(newCourse);
                setProblems(generateProblems(newCourse));
                setCurrentIndex(0);
                setTrayCoins([]);
                setFeedback(null);
                setIsGameComplete(false);
                
                if (newCourse !== course) {
                    setShowCourseTip(false);
                }
            }, [course, generateProblems]);

            useEffect(() => {
                startGame(course);
            }, []);

            const currentProblem = problems[currentIndex];
            const expectedChange = currentProblem ? currentProblem.paymentAmount - currentProblem.price : 0;
            const currentTotal = trayCoins.reduce((sum, coin) => sum + coin.value, 0);

            const handleAddCoin = (value) => {
                if (feedback?.type === 'success') return;
                AudioEngine.playCoin();
                setTrayCoins(prev => [...prev, { id: Math.random().toString(36).substr(2, 9), value }]);
                setFeedback(null);
            };

            const handleRemoveCoin = (idToRemove) => {
                if (feedback?.type === 'success') return;
                AudioEngine.playCoin(); 
                setTrayCoins(prev => prev.filter(c => c.id !== idToRemove));
                setFeedback(null);
            };

            const handleCheckAnswer = () => {
                if (currentTotal === expectedChange) {
                    const optimalCount = calculateOptimalCoinCount(expectedChange);
                    
                    if (trayCoins.length > optimalCount) {
                        AudioEngine.playCorrect(); 
                        const counts = {};
                        trayCoins.forEach(c => { counts[c.value] = (counts[c.value] || 0) + 1; });

                        let advice = "こうかを まとめて みよう。";
                        if (counts[1] >= 5) advice = "1えんだまが 5まい いじょう あるね。 5えんだまに かえられないかな？";
                        else if (counts[5] >= 2) advice = "5えんだまが 2まい いじょう あるね。 10えんだまに かえられないかな？";
                        else if (counts[10] >= 5) advice = "10えんだまが 5まい いじょう あるね。 50えんだまに かえられないかな？";
                        else if (counts[50] >= 2) advice = "50えんだまが 2まい いじょう あるね。 100えんだまに かえられないかな？";
                        else if (counts[100] >= 5) advice = "100えんだまが 5まい いじょう あるね。 500えんだまに かえられないかな？";

                        setFeedback({
                            type: 'info',
                            message: `きんがくは せいかい！ でも、もっと すくない かず（${optimalCount}まい）で わたせるよ。${advice} もういちど 「こたえあわせ」を してね！`
                        });
                    } else {
                        AudioEngine.playCorrect(); 
                        setFeedback({ type: 'success', message: 'かんぺき！ すばらしい！' });
                    }
                } else if (currentTotal < expectedChange) {
                    AudioEngine.playError(); 
                    const shortage = expectedChange - currentTotal;
                    let suggestCoin = 1;
                    for (let coin of COINS) {
                        if (shortage >= coin) {
                            suggestCoin = coin;
                            break;
                        }
                    }
                    setFeedback({ 
                        type: 'error', 
                        message: `おつりが たりない みたい。 【 ${suggestCoin}えんだま 】を たして みようか？` 
                    });
                } else {
                    AudioEngine.playError(); 
                    const overage = currentTotal - expectedChange;
                    const uniqueTrayCoins = [...new Set(trayCoins.map(c => c.value))].sort((a, b) => a - b);
                    let suggestCoin = uniqueTrayCoins[uniqueTrayCoins.length - 1]; 
                    
                    for (let coin of uniqueTrayCoins) {
                        if (coin >= overage) {
                            suggestCoin = coin;
                            break; 
                        }
                    }
                    setFeedback({ 
                        type: 'error', 
                        message: `おつりが おおすぎるよ。 トレイにある 【 ${suggestCoin}えんだま 】を へらして みよう。` 
                    });
                }
            };

            const handleNextProblem = () => {
                if (currentIndex < problems.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setTrayCoins([]);
                    setFeedback(null);
                } else {
                    setIsGameComplete(true);
                    setFeedback(null);
                }
            };

            if (!currentProblem) return <div className="flex items-center justify-center h-screen font-bold text-2xl text-pink-500">じゅんびちゅう...</div>;

            return (
                <div className="h-screen w-screen text-slate-800 selection:bg-blue-200 overflow-hidden flex flex-col">
                    <div className="flex-1 flex flex-col p-2 md:p-3 max-w-7xl mx-auto w-full h-full">
                        
                        {/* Header */}
                        <header className="flex justify-between items-center bg-white p-3 rounded-2xl shadow-md mb-3 border-4 border-white flex-shrink-0 relative z-50">
                            <h1 className="text-xl md:text-2xl font-black text-pink-500 flex items-center gap-2 drop-shadow-sm">
                                おつりをピッタリわたそう
                            </h1>
                            <div className="flex items-center gap-3 text-sm font-bold">
                                
                                <div className="hidden md:flex items-center bg-pink-50 p-1 rounded-xl border-2 border-pink-100">
                                    <button onClick={() => { startGame('easy'); setShowCourseTip(false); }} className={`px-4 py-2 rounded-lg transition-all ${course === 'easy' ? 'bg-white shadow-sm text-pink-500 border-2 border-pink-200' : 'text-pink-400 hover:bg-pink-100 border-2 border-transparent'}`}>かんたん</button>
                                    
                                    <div className="relative inline-flex justify-center items-center">
                                        {showCourseTip && (
                                            <div className="absolute top-full left-1/2 -translate-x-1/2 mt-3 z-[60]">
                                                <div className="bg-sky-500 text-white px-4 py-2 rounded-2xl text-[14px] font-black w-max shadow-lg animate-bounce border-2 border-sky-400 relative">
                                                    <div className="absolute -top-[10px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-b-[10px] border-b-sky-500"></div>
                                                    コースを えらぼう
                                                </div>
                                            </div>
                                        )}
                                        <button onClick={() => { startGame('normal'); setShowCourseTip(false); }} className={`px-4 py-2 rounded-lg transition-all ${course === 'normal' ? 'bg-white shadow-sm text-pink-500 border-2 border-pink-200' : 'text-pink-400 hover:bg-pink-100 border-2 border-transparent'}`}>ふつう</button>
                                    </div>

                                    <button onClick={() => { startGame('hard'); setShowCourseTip(false); }} className={`px-4 py-2 rounded-lg transition-all ${course === 'hard' ? 'bg-white shadow-sm text-pink-500 border-2 border-pink-200' : 'text-pink-400 hover:bg-pink-100 border-2 border-transparent'}`}>むずかしい</button>
                                </div>
                                
                                <div className="relative flex justify-end">
                                    {showHintTip && (
                                        <div className="absolute top-full right-0 mt-6 z-[70]">
                                            <div className="bg-amber-500 text-white px-3 py-2 rounded-2xl text-[13px] leading-snug font-black w-max shadow-lg animate-bounce border-2 border-amber-400 text-center relative">
                                                <div className="absolute -top-[10px] right-[40px] w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-b-[10px] border-b-amber-500"></div>
                                                ヒントの こたえを だすか<br/>ださないかを えらぼう
                                            </div>
                                        </div>
                                    )}
                                    <button onClick={() => { setHintEnabled(!hintEnabled); setShowHintTip(false); }} className={`flex items-center gap-1 px-4 py-2 rounded-xl border-b-4 transition-all active:border-b-0 active:translate-y-1 ${hintEnabled ? 'bg-amber-100 border-amber-300 text-amber-700' : 'bg-slate-100 border-slate-300 text-slate-400'}`}>
                                        <HelpCircle size={18} /> ヒント
                                    </button>
                                </div>
                            </div>
                        </header>

                        {isGameComplete ? (
                            <div className="flex-1 flex flex-col items-center justify-center bg-white rounded-3xl shadow-xl p-8 border-8 border-pink-200 z-50">
                                <div className="text-7xl mb-4 animate-bounce">🎉</div>
                                <h2 className="text-4xl font-black text-pink-500 mb-4 drop-shadow-sm">ぜんもん クリア！</h2>
                                <p className="text-slate-600 mb-8 text-xl font-bold">きみは りっぱな レジマスターだ！</p>
                                <button onClick={() => startGame()} className="bg-sky-400 hover:bg-sky-500 text-white font-black py-4 px-10 rounded-full shadow-lg border-b-4 border-sky-600 active:border-b-0 active:translate-y-1 transition-all text-2xl">もういちど あそぶ</button>
                            </div>
                        ) : (
                            <div className="flex-1 grid grid-cols-1 md:grid-cols-3 gap-3 min-h-0">
                                
                                {/* Left Column: 商品と支払い */}
                                <div className="flex flex-col gap-3 h-full">
                                    <div className="flex justify-between items-center font-bold text-sky-600 bg-sky-50 px-5 py-3 rounded-2xl shadow-sm border-4 border-sky-100 flex-shrink-0">
                                        <span className="text-lg">だい {currentIndex + 1} もん</span>
                                        {hintEnabled && (
                                            <span className="text-amber-600 flex items-center gap-1 bg-amber-100 px-3 py-1 rounded-full text-sm whitespace-nowrap">
                                                <Lightbulb size={18} /> こたえ: {expectedChange}えん
                                            </span>
                                        )}
                                    </div>

                                    <div className="flex-1 bg-[#FFF8DC] p-4 rounded-3xl shadow-md border-4 border-[#FFD700] text-center flex flex-col justify-center items-center">
                                        <div className="text-7xl mb-2 drop-shadow-md">{currentProblem.icon}</div>
                                        <div className="text-2xl font-black text-slate-700">{currentProblem.name}</div>
                                        <div className="text-4xl font-black text-rose-500 mt-2 bg-white px-6 py-2 rounded-full shadow-inner border-2 border-rose-100">{currentProblem.price}えん</div>
                                    </div>

                                    <div className="h-[30%] bg-blue-50 p-4 rounded-3xl shadow-md border-4 border-blue-200 text-center flex flex-col justify-center items-center flex-shrink-0 relative mt-3">
                                        <div className="absolute top-[-15px] bg-white px-3 py-1 rounded-full text-[13px] md:text-sm font-bold text-blue-600 border-2 border-blue-200 shadow-sm whitespace-nowrap">おきゃくさんが だした おかね</div>
                                        {currentProblem.paymentAmount >= 1000 ? (
                                            <div className="w-40 h-20 bg-gradient-to-br from-green-50 to-green-100 border-2 border-green-500 rounded-lg flex items-center justify-between px-4 shadow-md mt-2">
                                                <div className="text-3xl">👨</div>
                                                <div className="text-3xl font-black text-green-800 drop-shadow-sm">1000</div>
                                            </div>
                                        ) : (
                                            <div className="mt-2 flex gap-1 justify-center items-center">
                                                {currentProblem.paymentCoins.map((val, idx) => (
                                                    <Coin 
                                                        key={idx} 
                                                        value={val} 
                                                        scaleMultiplier={currentProblem.paymentCoins.length > 1 ? 2.1 : 2.5} 
                                                    />
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Middle Column: トレイとアクション */}
                                <div className="flex flex-col gap-3 h-full">
                                    <div className="flex-1 bg-[#F0FFF0] rounded-3xl p-4 shadow-md border-4 border-[#90EE90] flex flex-col relative mt-3">
                                        <div className="absolute top-[-15px] left-1/2 transform -translate-x-1/2 bg-white px-4 py-1 rounded-full text-sm font-bold text-green-600 border-2 border-[#90EE90] shadow-sm z-10 whitespace-nowrap">
                                            おつりを おく トレイ
                                        </div>
                                        <div className="flex justify-end items-center mb-2 mt-4 flex-shrink-0">
                                            <div className="text-3xl font-black text-green-600 bg-white px-4 py-1 rounded-full shadow-inner border-2 border-green-100">{currentTotal}えん</div>
                                        </div>
                                        
                                        <div className="flex-1 flex flex-col gap-2 overflow-y-auto pt-2">
                                            {COINS.map(coinValue => {
                                                const coinsOfThisValue = trayCoins.filter(c => c.value === coinValue);
                                                if (coinsOfThisValue.length === 0) return null;
                                                
                                                return (
                                                    <div key={coinValue} className="flex flex-wrap gap-2 justify-start">
                                                        {coinsOfThisValue.map(coin => (
                                                            <button key={coin.id} onClick={() => handleRemoveCoin(coin.id)} className="transition-transform hover:scale-110 active:scale-95 duration-200 drop-shadow-md">
                                                                <Coin value={coin.value} scaleMultiplier={2.2} />
                                                            </button>
                                                        ))}
                                                    </div>
                                                );
                                            })}

                                            {trayCoins.length === 0 && (
                                                <div className="w-full h-full flex flex-col items-center justify-center text-green-600/60 font-bold text-center p-4 gap-2">
                                                    <div className="text-lg">レジから こうかを タップして<br/>ここに いれます</div>
                                                    <div className="text-sm">もどす ときは、<br/>こうかを タップ します</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex gap-3 flex-shrink-0">
                                        <button onClick={handleCheckAnswer} disabled={trayCoins.length === 0 || feedback?.type === 'success'} className="flex-1 bg-pink-500 hover:bg-pink-600 disabled:bg-slate-300 disabled:border-slate-400 text-white font-black py-3 rounded-2xl border-b-4 border-pink-700 active:border-b-0 active:translate-y-1 transition-all shadow-md flex justify-center items-center gap-2 text-xl">
                                            <CheckCircle size={24} /> こたえあわせ
                                        </button>
                                        <button onClick={() => { setTrayCoins([]); setFeedback(null); }} disabled={trayCoins.length === 0 || feedback?.type === 'success'} className="w-auto px-4 flex justify-center items-center bg-sky-400 hover:bg-sky-500 disabled:bg-slate-200 disabled:text-slate-400 disabled:border-slate-300 text-white font-bold rounded-2xl border-b-4 border-sky-600 active:border-b-0 active:translate-y-1 transition-all shadow-md gap-1">
                                            <RotateCcw size={20} /> やりなおし
                                        </button>
                                    </div>

                                    <div className="h-40 flex-shrink-0">
                                        {feedback && (
                                            <div className={`h-full p-4 rounded-3xl border-4 flex items-center gap-3 shadow-md ${feedback.type === 'success' ? 'bg-green-100 border-green-300 text-green-800' : feedback.type === 'info' ? 'bg-amber-100 border-amber-300 text-amber-800' : 'bg-rose-100 border-rose-300 text-rose-800'}`}>
                                                <div className="flex-shrink-0 bg-white p-2 rounded-full shadow-sm">
                                                    {feedback.type === 'success' ? <CheckCircle size={28} className="text-green-600" /> : feedback.type === 'info' ? <Lightbulb size={28} className="text-amber-500" /> : <XCircle size={28} className="text-rose-500" />}
                                                </div>
                                                <div className="flex-1 font-bold text-[15px] md:text-base leading-relaxed">{feedback.message}</div>
                                                {(feedback.type === 'success') && (
                                                    <button onClick={handleNextProblem} className="flex-shrink-0 bg-white text-current p-3 rounded-full shadow-md hover:shadow-lg active:scale-95 transition-all">
                                                        <ArrowRight size={24} />
                                                    </button>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Right Column: レジスター */}
                                <div className="bg-[#F5F5F5] rounded-3xl p-4 shadow-md flex flex-col h-full border-4 border-[#DDDDDD] relative mt-3">
                                    <div className="absolute top-[-15px] left-1/2 transform -translate-x-1/2 bg-white px-6 py-1 rounded-full text-sm font-black text-slate-500 border-2 border-[#DDDDDD] shadow-sm z-10">
                                        レジスター
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3 flex-1 min-h-0 mt-4">
                                        {COINS.map(val => (
                                            <button key={val} onClick={() => handleAddCoin(val)} disabled={feedback?.type === 'success'} className="h-full bg-white hover:bg-slate-50 disabled:opacity-50 disabled:hover:bg-white rounded-2xl flex flex-col items-center justify-center gap-2 transition-all active:scale-95 shadow-sm border-2 border-slate-200 min-h-0 py-2 group">
                                                <Coin value={val} scaleMultiplier={2.8} />
                                                <span className="font-bold text-slate-500 text-sm bg-slate-100 px-3 py-1 rounded-full group-hover:bg-slate-200 transition-colors">+{val}えん</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
